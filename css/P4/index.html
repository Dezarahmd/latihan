<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS P4</title>
    <link rel="stylesheet" href="style.css">
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="card">
        <div class="card-image">
            <img src="karina.jpg" alt="karina">
        </div>
        <div class="card-content">
            <h2 class="card-title">
                <span class="name">Karina</span>
                <span class="real-name">(Yoo Jimin)</span>
            </h2>
            <p class="card-role">Leader, Main Dancer, Visual</p>
            <p class="card-desc">Leader of aespa known for her strong charisma and amazing dance skills. A K-pop visual icon with a unique style and stage performances that always steal the spotlight.</p>
            <button class="card-btn">See Profile</button>
        </div>
    </div>
</body>

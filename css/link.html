<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link</title>
    <style>
        a {
            background-color: white;
            border-style: solid;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-family: sans-serif;
        }

        a:visited {
            color: black;
        }

        a:hover {
            color:white;
            background-color: blue;
            transition: all 0.2s ease-in-out;

        }

        div {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div>
        <a href="https://www.youtube.com/aespa" target="_blank">YT</a>
        <a href="https://www.instagram.com/katarinabluu" target="_blank">Karina</a>
    </div>
</body>
</html>

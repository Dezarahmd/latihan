<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
    <style>
        a {
            color: red;
        }
        a[target] {
            color: black;
        }
    </style>
</head>
<body>
    <a href="" target="_blank">Contoh 1</a>
    <br>
    <a href="">Contoh</a>
    <br>
    <a href="" target="_self">Contoh</a>
    <br>
    <a href="">contoh</a>
</body>
</html>

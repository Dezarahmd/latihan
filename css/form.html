<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            margin: 10px;
        }
        body {
            font-family: sans-serif;
        }

        #username, #password {
            border: 1px solid black;
            border-radius: 5px;
            padding: 8px;
        }

        #username:focus, #password:focus {
            color: white;
            background-color: rgb(110, 95, 75);
        }

        #login {
            font-size: 20px;
            border-style: none;
            border-radius: 5px;
            background-color: blue;
            color: aliceblue;
        }

        #login:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <form action="">
        <label for="username">
            Username : 
            <input type="text" required id="username">
            <br>
        </label>
        <label for="password">
            Password :
            <input type="text" required id="password">
        </label>
        <br>
        <input type="submit" id="login" value="login">
    </form>
</body>
</html>
